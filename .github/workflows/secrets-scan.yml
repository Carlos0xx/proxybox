name: secrets-scan

# Second-layer secret scan beyond gitleaks. Yelp's detect-secrets uses a
# different rule set (entropy + plugin-based heuristics) and catches a
# slightly different population of false-positives + true-positives.
# Running both means a regression that slips past one tool usually still
# trips the other.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"

      - name: install detect-secrets
        run: pip install detect-secrets

      - name: scan + fail on findings
        run: python3 scripts/detect-secrets-ci.py
