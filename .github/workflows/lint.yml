name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: ruff check
        run: ruff check app/ bot/ tests/ scripts/
      - name: ruff format --check
        run: ruff format --check app/ bot/ tests/ scripts/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - name: shellcheck install
        run: sudo apt-get -y install shellcheck
      - run: find deploy scripts -name '*.sh' -print0 | xargs -0 shellcheck -S warning
