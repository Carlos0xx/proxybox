name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: ruff check
        run: ruff check app/ bot/ tests/ scripts/
      - name: ruff format --check
        run: ruff format --check app/ bot/ tests/ scripts/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: shellcheck install
        run: sudo apt-get -y install shellcheck
      - run: find deploy scripts -name '*.sh' -print0 | xargs -0 shellcheck -S warning
